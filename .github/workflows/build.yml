name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Superseded pushes/PR updates cancel in-flight runs (saves macOS minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repo. (The release workflow
# separately grants contents: write for publishing.)
permissions:
  contents: read

jobs:
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: SwiftLint (errors fail; warnings advisory)
        run: |
          which swiftlint || brew install swiftlint
          swiftlint lint --reporter github-actions-logging Sources

  build-macos:
    runs-on: macos-15   # Apple Silicon runner (arm64)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build SonarForge (Debug)
        run: |
          set -o pipefail
          xcodebuild -project SonarForge.xcodeproj \
                     -scheme SonarForge \
                     -configuration Debug \
                     -destination 'platform=macOS,arch=arm64' \
                     CODE_SIGNING_ALLOWED=NO \
                     clean build

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild -project SonarForge.xcodeproj \
                     -scheme SonarForge \
                     -configuration Debug \
                     -destination 'platform=macOS,arch=arm64' \
                     CODE_SIGNING_ALLOWED=NO \
                     test

      - name: Verify arm64-only binary
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -path '*Debug/SonarForge.app/Contents/MacOS/SonarForge' | head -1)
          file "$APP"
          file "$APP" | grep -q 'arm64' || { echo "Binary is not arm64"; exit 1; }
          if file "$APP" | grep -q 'x86_64'; then echo "Binary contains x86_64 slice"; exit 1; fi
