# XcodeGen project definition for SonarForge.
#
# The committed SonarForge.xcodeproj is generated from this file:
#   xcodegen generate
#
# Platform constraints are locked (see DECISIONS.md D-001 and
# Documentation/Xcode-Setup.md): macOS 14.2+ deployment target,
# Apple Silicon (arm64) only — no Intel / x86_64.

name: SonarForge

options:
  bundleIdPrefix: com.sonarforge
  deploymentTarget:
    macOS: "14.2"
  createIntermediateGroups: true

packages:
  # Lock-free atomics for audio-thread parameter flags (bypass, etc.).
  # The Synchronization framework's Atomic requires macOS 15; we deploy to 14.2.
  Atomics:
    url: https://github.com/apple/swift-atomics.git
    from: "1.2.0"

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.2"
    ARCHS: arm64
    VALID_ARCHS: arm64
    SUPPORTED_PLATFORMS: macosx
    SWIFT_VERSION: "5.0"
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: YES
    Release:
      ONLY_ACTIVE_ARCH: NO

targets:
  SonarForge:
    type: application
    platform: macOS
    sources:
      - path: Sources/SonarForge
      - path: Assets/Assets.xcassets
    dependencies:
      - package: Atomics
        product: Atomics
    entitlements:
      path: Sources/SonarForge/Resources/Entitlements.entitlements
      properties:
        # REQUIRED under the hardened runtime: without it the Core Audio tap
        # silently delivers zeros in Release builds. Declared here so `xcodegen
        # generate` regenerates the file WITH the key — a path-only entitlements
        # block overwrites the file with an empty <dict/> and drops it. Do not remove.
        com.apple.security.device.audio-input: true
    info:
      path: Sources/SonarForge/Resources/Info.plist
      properties:
        CFBundleDisplayName: SonarForge
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "2"
        LSApplicationCategoryType: public.app-category.music
        NSAudioCaptureUsageDescription: >-
          SonarForge captures system audio with a Core Audio tap so it can
          apply your equalizer settings to everything you hear. Audio never
          leaves this Mac.
        NSHumanReadableCopyright: "Copyright © 2026 SonarForge contributors. Apache License 2.0."
    postbuildScripts:
      # actool emits a stripped-down AppIcon.icns; replace with the full multi-size
      # icon so Dock/Finder always have every required representation.
      - name: Install Full App Icon
        script: |
          FULL_ICON="${SRCROOT}/Assets/icon-exports/SonarForge.icns"
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/AppIcon.icns"
          if [ -f "$FULL_ICON" ]; then
            cp "$FULL_ICON" "$DEST"
          fi
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sonarforge.SonarForge
        PRODUCT_NAME: SonarForge
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        # Ad-hoc signing for local development; set a real team before distributing.
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES

  SonarForgeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Sources/SonarForgeTests
    dependencies:
      - target: SonarForge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sonarforge.SonarForgeTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SonarForge:
    build:
      targets:
        SonarForge: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - SonarForgeTests
    archive:
      config: Release
