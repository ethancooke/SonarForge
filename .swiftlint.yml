# SwiftLint configuration for SonarForge.
# Philosophy: catch real defects; encode the project's existing conventions
# rather than fight them. CI fails on errors only (warnings are advisory).

excluded:
  - build
  - SonarForge.xcodeproj
  - Assets

# DSP code legitimately uses RBJ Audio EQ Cookbook notation (b0, a1, q, w0, A…)
# and short math locals. Single-character identifiers are idiomatic here.
identifier_name:
  min_length: 1
  max_length: 60
  excluded:
    - A   # RBJ cookbook amplitude (10^(dB/40)) — canonical DSP notation

# Long help strings / doc comments are common and preferred over awkward wraps.
line_length:
  warning: 150
  error: 240
  ignores_comments: true
  ignores_urls: true

# This codebase intentionally uses trailing commas in multiline collections.
disabled_rules:
  - trailing_comma

function_body_length:
  warning: 90
  error: 180

type_body_length:
  # AudioEngine is one deliberately cohesive realtime class; its lock-free
  # invariants don't split cleanly, so allow a little headroom (grew again when
  # the crossfeed DSP stage was wired into the same IO path).
  warning: 480
  error: 700

file_length:
  warning: 700
  error: 1100

cyclomatic_complexity:
  # The realtime IO block has many small OSStatus / branch checks but is
  # intentionally a single function on the hot audio path.
  warning: 20
  error: 30

# Nested enums inside a result struct (e.g. ParseResult.Format) are idiomatic.
nesting:
  type_level: 2

# RGB color stops and (x, y) coordinate pairs are idiomatic 3-tuples.
large_tuple:
  warning: 3
